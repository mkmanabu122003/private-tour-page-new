[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.processing]
  [build.processing.html]
    pretty_urls = false

# 301 redirects: old /routes/ URLs → new /tours/ URLs
[[redirects]]
  from = "/routes/ginza-the-luxury-shopping-district"
  to = "/tours/tsukiji-ginza"
  status = 301

[[redirects]]
  from = "/routes/asakusa-senso-ji-temple"
  to = "/tours/asakusa"
  status = 301

[[redirects]]
  from = "/routes/yanaka-old-town"
  to = "/tours/yanaka"
  status = 301

[[redirects]]
  from = "/routes/shibuya-harajuku"
  to = "/tours/shibuya-harajuku"
  status = 301

[[redirects]]
  from = "/routes/imperial-palace"
  to = "/tours/imperial-palace"
  status = 301

[[redirects]]
  from = "/routes/selection-of-temples-and-shrines"
  to = "/tours/asakusa"
  status = 301

[[redirects]]
  from = "/routes/shita-machi"
  to = "/tours/asakusa"
  status = 301

# Catch-all: any other old /routes/ URL → /tours listing page
[[redirects]]
  from = "/routes/*"
  to = "/tours"
  status = 301

# /custom-tours → /tours/custom redirect
[[redirects]]
  from = "/custom-tours"
  to = "/tours/custom"
  status = 301

# /booking → /contact redirect (no booking page exists)
[[redirects]]
  from = "/booking"
  to = "/contact"
  status = 301

# 301 redirects: other legacy URLs
[[redirects]]
  from = "/multi-day-tours"
  to = "/tours"
  status = 301

# 404: removed pages with no replacement
[[redirects]]
  from = "/policies"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/privacy-policy"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/cookies"
  to = "/404.html"
  status = 404

# Blog article consolidation: licensed guide article → hiring guide article
[[redirects]]
  from = "/blog/licensed-tour-guide-japan"
  to = "/blog/is-it-worth-hiring-a-tour-guide-in-tokyo"
  status = 301
  force = true

# Spanish blog article consolidation: licensed guide article → hiring guide article
[[redirects]]
  from = "/es/blog/guia-licencia-oficial-japon"
  to = "/es/blog/vale-la-pena-contratar-guia"
  status = 301
  force = true

# Spanish blog article consolidation: monte fuji duplicate → canonical
[[redirects]]
  from = "/es/blog/monte-fuji-desde-tokio"
  to = "/es/blog/monte-fuji-se-ve-desde-tokio"
  status = 301
  force = true

# Remove trailing slashes: /path/ → /path (301 redirect)
[[redirects]]
  from = "/:splat/"
  to = "/:splat"
  status = 301
  force = true

# SPA catch-all (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
