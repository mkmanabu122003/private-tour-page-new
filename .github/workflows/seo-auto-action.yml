name: SEO Auto Action (Claude Code)

on:
  issues:
    types: [opened, labeled]

jobs:
  implement:
    # seo-auto-action ラベルが付いたIssueでのみ実行
    if: contains(github.event.issue.labels.*.name, 'seo-auto-action')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Extract Claude Code prompt from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const match = body.match(/<claude-code-prompt>([\s\S]*?)<\/claude-code-prompt>/);
            if (match) {
              const prompt = match[1].trim();
              core.setOutput('prompt', prompt);
              core.setOutput('issue_number', context.payload.issue.number);

              // IssueのタイトルからAction IDを抽出してブランチ名に使う
              const title = context.payload.issue.title;
              const branchName = title
                .replace('[SEO Auto] ', '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '')
                .substring(0, 50);
              core.setOutput('branch', `seo/${branchName}-${context.payload.issue.number}`);
            } else {
              core.setFailed('No claude-code-prompt found in issue body');
            }

      - name: Create branch
        run: |
          git checkout -b ${{ steps.extract.outputs.branch }}

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Claude Code CLIを使用して実装
          npx claude-code --print --dangerously-skip-permissions \
            "${{ steps.extract.outputs.prompt }}"

      - name: Build check
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "SEO Pipeline Bot"
          git config user.email "seo-bot@tanuki-tabi-travel.com"
          git add -A

          # 変更がある場合のみコミット
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "seo: auto-implement action from issue #${{ steps.extract.outputs.issue_number }}"
          git push origin ${{ steps.extract.outputs.branch }}

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const branch = '${{ steps.extract.outputs.branch }}';

            // PR作成
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: context.payload.issue.title.replace('[SEO Auto]', '[SEO PR]'),
              body: `## Auto-generated PR\n\nImplements #${issueNumber}\n\n**Please review the changes before merging.**\n\nAfter merging, Netlify will auto-deploy.`,
              head: branch,
              base: 'main'
            });

            // Issueにコメント
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ PR created: ${pr.data.html_url}\n\nPlease review and merge when ready.`
            });

            // Issueのステータスを更新
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['pr-created']
            });

      - name: Handle failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `❌ Auto-implementation failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nYou may need to implement this manually or adjust the prompt.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['auto-failed']
            });
