name: SEO Auto Action (Claude Code)

on:
  issues:
    types: [opened, labeled]

jobs:
  implement:
    # seo-auto-action ラベルが付いたIssueでのみ実行
    # auto-failed や pr-created ラベルが付いている場合はスキップ
    if: |
      contains(github.event.issue.labels.*.name, 'seo-auto-action') &&
      !contains(github.event.issue.labels.*.name, 'pr-created')
    runs-on: ubuntu-latest
    concurrency:
      group: seo-auto-${{ github.event.issue.number }}
      cancel-in-progress: true

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Extract Claude Code prompt from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const match = body.match(/<claude-code-prompt>([\s\S]*?)<\/claude-code-prompt>/);
            if (match) {
              const prompt = match[1].trim();
              core.setOutput('prompt', prompt);
              core.setOutput('issue_number', context.payload.issue.number);

              // IssueのタイトルからAction IDを抽出してブランチ名に使う
              const title = context.payload.issue.title;
              const branchName = title
                .replace('[SEO Auto] ', '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '')
                .substring(0, 50);
              core.setOutput('branch', `seo/${branchName}-${context.payload.issue.number}`);
            } else {
              core.setFailed('No claude-code-prompt found in issue body');
            }

      - name: Create branch
        run: |
          BRANCH="${{ steps.extract.outputs.branch }}"

          # リモートに同名ブランチがあれば削除
          if git ls-remote --heads origin "$BRANCH" | grep -q .; then
            echo "Deleting existing remote branch: $BRANCH"
            git push origin --delete "$BRANCH" || true
          fi

          git checkout -b "$BRANCH"

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Claude Code CLIを使用して実装
          npx claude-code --print --dangerously-skip-permissions \
            "${{ steps.extract.outputs.prompt }}"

      - name: Build check
        run: npm run build

      - name: Commit and push
        id: push
        run: |
          git config user.name "SEO Pipeline Bot"
          git config user.email "seo-bot@tanuki-tabi-travel.com"
          git add -A

          # 変更がある場合のみコミット
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "seo: auto-implement action from issue #${{ steps.extract.outputs.issue_number }}"
          git push origin ${{ steps.extract.outputs.branch }}
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.push.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            const branch = '${{ steps.extract.outputs.branch }}';

            // 既存のPRがないか確認
            const existingPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            let prUrl;
            if (existingPRs.data.length > 0) {
              prUrl = existingPRs.data[0].html_url;
              console.log(`PR already exists: ${prUrl}`);
            } else {
              // PR作成
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: context.payload.issue.title.replace('[SEO Auto]', '[SEO PR]'),
                body: `## Auto-generated PR\n\nImplements #${issueNumber}\n\n**Please review the changes before merging.**\n\nAfter merging, Netlify will auto-deploy.`,
                head: branch,
                base: 'main'
              });
              prUrl = pr.data.html_url;
            }

            // Issueにコメント
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ PR created: ${prUrl}\n\nPlease review and merge when ready.`
            });

            // Issueのステータスを更新
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['pr-created']
            });

      - name: No changes found
        if: steps.push.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `⚠️ Claude Code ran but produced no changes. The implementation may need manual intervention.`
            });

      - name: Handle failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue_number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `❌ Auto-implementation failed. Check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nYou may need to implement this manually or adjust the prompt.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['auto-failed']
            });
